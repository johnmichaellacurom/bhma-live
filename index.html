    <script src="assets/html2canvas/html2canvas.min.js"></script>
    <script src="backend/please_wait.js"></script>
    <script src="backend/theme.js"></script>
    
    <script type="module" src="backend/index.js" defer></script>
    <script type="module" src="backend/dashboard.js" defer></script>
    <script type="module" src="backend/reminders.js" defer></script>
    <script type="module" src="backend/rents.js" defer></script>
    <script type="module" src="backend/bills.js" defer></script> 
    <script type="module" src="backend/payments.js" defer></script>
    <script type="module" src="backend/belongings.js" defer></script>

    <script type="module" src="backend/rooms.js" defer></script>
    <script type="module" src="backend/settings.js" defer></script>
    <script type="module" src="backend/database.js" defer></script>
    <script type="module" src="indexdb/database.js" defer></script>
  </head>
  <body>
    <section id="sectionPrintContent" class="d-none bg-white"></section>

    <section id="sectionMainContent">
      <!-- Please Wait Modal for Logo and Navigation  -->
      <button type="button" class="btn btn-primary d-none" data-bs-toggle="modal" data-bs-target="#pleaseWaitModal" id="pleaseWaitModalOpen">New</button>
      <div class="modal fade" id="pleaseWaitModal" tabindex="-1" aria-labelledby="pleaseWaitModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-m modal-dialog-scrollable opacity-0">
          <div class="modal-content d-flex align-items-center justify-content-center flex-column p-3 gap-2">
            <div class="modal-header d-none">
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="pleaseWaitModalClose"></button>
            </div>
            <div class="spinner spinner-border text-primary"></div>
            <p class="mb-0 text-primary">Please wait...</p>
          </div>
        </div>
      </div>

              <h4 class="mb-0"><div class="bh-name"></div></h4>
            </div>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" style="overflow:auto; width: 100% !important;" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0" style="overflow:auto; max-height:20rem;">
              <li class="nav-item my-1" id="dashboardNavItem">
                <a class="nav-link active" aria-current="page" href="#dashboard" id="dashboardNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard-icon lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>Dashboard
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="rentsNavItem">
                <a class="nav-link" aria-current="page" href="#rents" id="rentsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Rents
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="billsNavItem">
                <a class="nav-link" aria-current="page" href="#bills" id="billsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-receipt-text-icon lucide-receipt-text"><path d="M13 16H8"/><path d="M14 8H8"/><path d="M16 12H8"/><path d="M4 3a1 1 0 0 1 1-1 1.3 1.3 0 0 1 .7.2l.933.6a1.3 1.3 0 0 0 1.4 0l.934-.6a1.3 1.3 0 0 1 1.4 0l.933.6a1.3 1.3 0 0 0 1.4 0l.933-.6a1.3 1.3 0 0 1 1.4 0l.934.6a1.3 1.3 0 0 0 1.4 0l.933-.6A1.3 1.3 0 0 1 19 2a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1 1.3 1.3 0 0 1-.7-.2l-.933-.6a1.3 1.3 0 0 0-1.4 0l-.934.6a1.3 1.3 0 0 1-1.4 0l-.933-.6a1.3 1.3 0 0 0-1.4 0l-.933.6a1.3 1.3 0 0 1-1.4 0l-.934-.6a1.3 1.3 0 0 0-1.4 0l-.933.6a1.3 1.3 0 0 1-.7.2 1 1 0 0 1-1-1z"/></svg>Bills
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="paymentsNavItem">
                <a class="nav-link" aria-current="page" href="#payments" id="paymentsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-wallet-cards-icon lucide-wallet-cards"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2"/><path d="M3 11h3c.8 0 1.6.3 2.1.9l1.1.9c1.6 1.6 4.1 1.6 5.7 0l1.1-.9c.5-.5 1.3-.9 2.1-.9H21"/></svg>Payments
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="belongingsNavItem">
                <a class="nav-link" aria-current="page" href="#belongings" id="belongingsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-lock-icon lucide-user-lock"><circle cx="10" cy="7" r="4"/><path d="M10.3 15H7a4 4 0 0 0-4 4v2"/><path d="M15 15.5V14a2 2 0 0 1 4 0v1.5"/><rect width="8" height="5" x="13" y="16" rx=".899"/></svg>Belongings
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="boardersNavItem">
                <a class="nav-link" aria-current="page" href="#boarders" id="boardersNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users-round-icon lucide-users-round"><path d="M18 21a8 8 0 0 0-16 0"/><circle cx="10" cy="8" r="5"/><path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/></svg>Boarders
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="roomsNavItem">
                <a class="nav-link" aria-current="page" href="#rooms" id="roomsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-warehouse-icon lucide-warehouse"><path d="M18 21V10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1v11"/><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 1.132-1.803l7.95-3.974a2 2 0 0 1 1.837 0l7.948 3.974A2 2 0 0 1 22 8z"/><path d="M6 13h12"/><path d="M6 17h12"/></svg>Rooms
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="settingsNavItem">
                <a class="nav-link" aria-current="page" href="#settings" id="settingsNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings-icon lucide-settings"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>Settings
                  </div>
                </a>
              </li>
              <li class="nav-item my-1" id="databaseNavItem">
                <a class="nav-link" aria-current="page" href="#database" id="databaseNavLink">
                  <div class="d-flex align-items-center justify-content-start p-2 gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-database-icon lucide-database"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>Database
                  </div>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Content Display  -->
      <main id="mainContent" class="p-3"></main>

      <footer class="text-center p-3" id="footer">
        <p class="mb-0">Please wait...</p>
      </footer>

      <!-- Toast  -->
      <button type="button" class="btn btn-primary d-none" id="liveToastBtn">Show live toast</button>
      <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
        <div id="liveToast" class="toast " role="alert" aria-live="assertive" aria-atomic="true">
          <div class="toast-header">
            <img src="assets/img/logo.png" width="20" height="20" class="rounded-circle me-2" alt="...">
            <strong class="me-auto"><div class="bh-name"><span class="text-primary">KKK</span> BH</div></strong>
            <small>Just now</small>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
          <div id="toastBody" class="toast-body d-flex align-items-center justify-content-start gap-2">
            <div id="toastBodyDetails">Message will appear here...</div>
          </div>
        </div>
      </div>

      <!--Expired Modal  -->
      <button type="button" class="btn btn-primary d-none" data-bs-toggle="modal" data-bs-target="#expiredModal" id="expiredModalButtonOpen">Expired Modal</button>
      <div class="modal fade" id="expiredModal" tabindex="-1" aria-labelledby="expiredModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-m modal-dialog-scrollable">
          <div class="modal-content accordion">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="expiredModalLabel">Expired</h1>
              <button type="button" class="btn-close d-none" data-bs-dismiss="modal" aria-label="Close" id="expiredModalButtonClose"></button>
            </div>
            <div class="modal-body d-flex align-items-center justify-content-between flex-column gap-3 accordion-item" id="expiredModalBody"></div>
          </div>
        </div>
      </div>
    </section>

    <script>
      //if ('serviceWorker' in navigator) {
      //  navigator.serviceWorker.register('/service-worker.js');
      //}

      const toastTrigger = document.getElementById('liveToastBtn')
      const toastLiveExample = document.getElementById('liveToast')

      if (toastTrigger) {
        const toastBootstrap = bootstrap.Toast.getOrCreateInstance(toastLiveExample)
        toastTrigger.addEventListener('click', () => {
          toastBootstrap.show()
        })
      }
    </script>

  </body>
</html>
