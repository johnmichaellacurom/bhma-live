<div class="w-100">
  <label class="form-label text-uppercase">Entries per page</label>
  <select class="form-select" id="settingsRemindersEntriesPerPage">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="25">25</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
</div>
<div class="w-100">
  <label class="form-label text-uppercase">Turn On Payment</label>
  <div class="d-flex align-items-center justify-content-start gap-2">
    <div>
      <input type="radio" checked value="On" class="form-check-input settings-reminders-turn-on-payment" name="settingsRemindersTurnOnPayment[]" id="settingsRemindersTurnOnPaymentOn"><label for="settingsRemindersTurnOnPaymentOn" class="form-label">On</label>
    </div>
    <div>
      <input type="radio" value="Off" class="form-check-input settings-reminders-turn-on-payment" name="settingsRemindersTurnOnPayment[]" id="settingsRemindersTurnOnPaymentOff"><label for="settingsRemindersTurnOnPaymentOff" class="form-label">Off</label>
    </div>
  </div>
</div>
<div class="w-100">
  <label class="form-label text-uppercase">Turn On Birthday</label>
  <div class="d-flex align-items-center justify-content-start gap-2">
    <div>
      <input type="radio" checked value="On" class="form-check-input settings-reminders-turn-on-birthday" name="settingsRemindersTurnOnBirthday[]" id="settingsRemindersTurnOnBirthdayOn"><label for="settingsRemindersTurnOnBirthdayOn" class="form-label">On</label>
    </div>
    <div>
      <input type="radio" value="Off" class="form-check-input settings-reminders-turn-on-birthday" name="settingsRemindersTurnOnBirthday[]" id="settingsRemindersTurnOnBirthdayOff"><label for="settingsRemindersTurnOnBirthdayOff" class="form-label">Off</label>
    </div>
  </div>
</div>
