<div class="w-100">
  <div class="d-flex align-items-center justify-content-start gap-2" >

    <div>
      <input type="radio" value="Dark" class="form-check-input settings-theme" name="settingsTheme[]" id="settingsThemeDark"><label for="settingsThemeDark" class="form-label">Dark</label>
