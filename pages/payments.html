          </div>
          <div class="w-100">
            <label class="form-label text-uppercase fw-semibold">Sort By Date Created</label>
            <div class="d-flex align-items-center justify-content-start gap-2">
              <div>
                <input type="radio" checked value="Ascending" class="form-check-input" name="filtersPaymentRentModalSort[]" id="filtersPaymentRentModalSortAscending"><label for="filtersPaymentRentModalSortAscending" class="form-label">Ascending</label>
              </div>
              <div>
                <input type="radio" value="Descending" class="form-check-input" name="filtersPaymentRentModalSort[]" id="filtersPaymentRentModalSortDescending"><label for="filtersPaymentRentModalSortDescending" class="form-label">Descending</label>
              </div>
            </div>
          </div>
          <div class="w-100">
            <label class="form-label text-uppercase fw-semibold">Payment Method</label>
            <div class="d-flex align-items-center justify-content-start gap-2">
              <div>
                <input type="radio" checked value="" class="form-check-input" name="filtersPaymentRentModalPaymentMethod[]" id="filtersPaymentRentModalPaymentMethodAll"><label for="filtersPaymentRentModalPaymentMethodAll" class="form-label">All</label>
              </div>
              <div>
                <input type="radio" value="Cash" class="form-check-input" name="filtersPaymentRentModalPaymentMethod[]" id="filtersPaymentRentModalPaymentMethodCash"><label for="filtersPaymentRentModalPaymentMethodCash" class="form-label">Cash</label>
              </div>
              <div>
                <input type="radio" value="E-Wallet" class="form-check-input" name="filtersPaymentRentModalPaymentMethod[]" id="filtersPaymentRentModalPaymentMethodEWallet"><label for="filtersPaymentRentModalPaymentMethodEWallet" class="form-label">E-Wallet</label>
              </div>
              <div>
                <input type="radio" value="Other" class="form-check-input" name="filtersPaymentRentModalPaymentMethod[]" id="filtersPaymentRentModalPaymentMethodOthers"><label for="filtersPaymentRentModalPaymentMethodOthers" class="form-label">Other</label>

            </div>
          </div>
          <div class="w-100">
            <label class="form-label text-uppercase fw-semibold">Search (Payment Code)</label>
            <input type="search" placeholder="Search" class="form-control" id="filtersPaymentRentModalSearch">
          </div>
          
          <div class="w-100">
            <button class="btn btn-primary d-flex align-items-center justify-content-center gap-2 flex-nowrap" type="submit" id="filtersPaymentRentModalApply">
              <span class="spinner-border spinner-border-sm visually-hidden" aria-hidden="true"></span>
              <span role="status">Apply</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
